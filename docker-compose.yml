services:
  # ── Frontend (Vue 3 + nginx) ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

  # ── Backend (FastAPI + LangGraph multi-agent) ──────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      # Neo4j
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-pangia-password}
      # GraphDB
      - GRAPHDB_URL=http://graphdb:7200
      - GRAPHDB_REPOSITORY=${GRAPHDB_REPOSITORY:-pangia}
      # ChromaDB
      - CHROMA_HOST=chromadb
      - CHROMA_PORT=8000
      # PostGIS
      - POSTGIS_DSN=postgresql://${POSTGIS_USER:-pangia}:${POSTGIS_PASSWORD:-pangia-password}@postgis:5432/${POSTGIS_DB:-pangia}
      # Redis
      - REDIS_URL=redis://redis:6379
      - CORS_ORIGINS=["http://localhost:3000","http://frontend"]
      # Arize Phoenix (observability)
      - PHOENIX_COLLECTOR_ENDPOINT=http://phoenix:6006/v1/traces
      - PHOENIX_PROJECT_NAME=${PHOENIX_PROJECT_NAME:-pangia-geoia}
    depends_on:
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      graphdb:
        condition: service_healthy
      chromadb:
        condition: service_healthy
      postgis:
        condition: service_healthy
      phoenix:
        condition: service_healthy
    restart: unless-stopped

  # ── Neo4j (Knowledge Graph agent) ─────────────────────────────────────────
  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"  # Browser UI
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-pangia-password}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── GraphDB (RDF / SPARQL agent) ───────────────────────────────────────────
  graphdb:
    image: ontotext/graphdb:10.7.0
    ports:
      - "7200:7200"  # HTTP API + workbench UI
    environment:
      - GDB_HEAP_SIZE=1g
    volumes:
      - graphdb_data:/opt/graphdb/home
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:7200/rest/repositories || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── ChromaDB (Vector / embedding agent) ───────────────────────────────────
  chromadb:
    image: chromadb/chroma:0.5.20
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
      - ANONYMIZED_TELEMETRY=FALSE
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/api/v1/heartbeat || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── PostGIS (Spatial SQL agent) ────────────────────────────────────────────
  postgis:
    image: postgis/postgis:16-3.4-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGIS_USER:-pangia}
      - POSTGRES_PASSWORD=${POSTGIS_PASSWORD:-pangia-password}
      - POSTGRES_DB=${POSTGIS_DB:-pangia}
    volumes:
      - postgis_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGIS_USER:-pangia} -d ${POSTGIS_DB:-pangia}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  # ── Arize Phoenix (Agent observability) ───────────────────────────────────
  phoenix:
    image: arizephoenix/phoenix:latest
    ports:
      - "6006:6006"  # Phoenix UI
      - "4317:4317"  # OTLP gRPC endpoint
    environment:
      - PHOENIX_WORKING_DIR=/phoenix
    volumes:
      - phoenix_data:/phoenix
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6006/healthz || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    restart: unless-stopped

  # ── Redis (Sessions) ───────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs:
  graphdb_data:
  chroma_data:
  postgis_data:
  redis_data:
  phoenix_data:
