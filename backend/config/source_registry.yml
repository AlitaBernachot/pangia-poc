# Source Registry – metadata declarations for all data-source connectors.
#
# Each entry maps to a SourceEntry in source_registry.py.
# Fields:
#   id          : unique identifier (must be unique across all entries)
#   connector   : agent key used in agents_to_call routing
#   description : human-readable description embedded into ChromaDB
#   topics      : domain keywords for entity-overlap scoring (list)
#   entity_types: named entity types stored in this source (list)
#   capabilities: capability tags for Smart Dispatcher hard-rule scoring (list)
#   geo_scope   : geographic scope — "france", "global", or null
#   mcp_url     : MCP endpoint URL (only for MCP-backed connectors)
#   example_questions: canonical example questions (list)

- id: neo4j
  connector: neo4j
  description: >
    Graphe de connaissances stockant les entités, leurs relations,
    les faits géographiques et les données historiques. Requêtes Cypher
    sur Neo4j. Idéal pour explorer des chaînes de relations complexes,
    des co-occurrences, des hiérarchies et des migrations d'entités.
  topics:
    - entités
    - relations
    - graphe
    - connaissances
    - faits
    - hiérarchie
  entity_types:
    - entité
    - lieu
    - organisation
    - événement
    - personne
    - territoire
  capabilities:
    - relationship
    - graph_traversal
    - entity_search
    - co-occurrence
    - hierarchy
  geo_scope: null
  example_questions:
    - "Quels acteurs sont impliqués dans ce projet ?"
    - "Qui finance cette initiative ?"
    - "Quelles sont les relations entre ces entités ?"
    - "Montrez-moi la chaîne de relations entre X et Y."

- id: rdf
  connector: rdf
  description: >
    Triplestore RDF (GraphDB / Ontotext) contenant des ontologies
    géospatiales et des données liées. Requêtes SPARQL et GeoSPARQL.
    Idéal pour le raisonnement sémantique, les données liées et les
    relations ontologiques.
  topics:
    - ontologie
    - données liées
    - sémantique
    - RDF
    - linked data
  entity_types:
    - concept
    - classe
    - instance
    - propriété
  capabilities:
    - ontology
    - linked_data
    - sparql
    - semantic_reasoning
    - geosparql
  geo_scope: null
  example_questions:
    - "Quels sont les types d'occupation du sol dans cette région ?"
    - "Définissez la relation entre ces deux concepts géographiques."
    - "Listez toutes les instances de la classe 'Zone protégée'."

- id: vector
  connector: vector_chroma
  description: >
    Base de données vectorielle ChromaDB contenant des documents
    géographiques, des descriptions et des faits sous forme d'embeddings.
    Recherche par similarité sémantique. Idéal pour les questions ouvertes,
    la recherche documentaire et les questions descriptives générales.
  topics:
    - documents
    - texte
    - descriptions
    - géographie
    - sémantique
  entity_types:
    - document
    - fragment
    - description
    - fiche
  capabilities:
    - semantic_search
    - similarity
    - document_retrieval
    - embedding
  geo_scope: null
  example_questions:
    - "Parlez-moi de cette espèce."
    - "Quels documents parlent de la biodiversité en Bretagne ?"
    - "Qu'est-ce que je dois savoir sur ce territoire ?"

- id: postgis
  connector: postgis
  description: >
    Base de données spatiale PostgreSQL/PostGIS contenant les données
    géométriques, les coordonnées, les zones et les requêtes spatiales SQL.
    Idéal pour les calculs géométriques, les intersections, le calcul de
    surfaces, les distances et la récupération de coordonnées précises.
  topics:
    - géométrie
    - coordonnées
    - spatial
    - zones
    - surfaces
    - distances
  entity_types:
    - point
    - polygone
    - ligne
    - zone
    - parcelle
    - bâtiment
  capabilities:
    - spatial_query
    - buffer
    - intersection
    - area
    - distance
    - coordinates
    - geometry
  geo_scope: null
  example_questions:
    - "Quelles entités se trouvent dans un rayon de 500 m ?"
    - "Quelle est la surface de cette zone ?"
    - "Où se trouvent les coordonnées de ce lieu ?"
    - "Quelles parcelles intersectent cette zone ?"

- id: data_gouv
  connector: data_gouv
  description: >
    Catalogue open data du gouvernement français (data.gouv.fr) accessible
    via MCP. Contient des jeux de données officiels : statistiques
    publiques, données administratives, limites territoriales,
    données environnementales et tout ce qui est en open data français.
  topics:
    - open data
    - statistiques
    - gouvernement
    - données publiques
    - France
    - officiel
  entity_types:
    - jeu de données
    - ressource
    - organisation
    - thème
  capabilities:
    - open_data
    - official_statistics
    - government_data
    - french_datasets
  geo_scope: france
  example_questions:
    - "Quelles sont les données officielles sur la population de cette commune ?"
    - "Trouvez des jeux de données sur la qualité de l'air en France."
    - "Quelles statistiques environnementales sont disponibles ?"

- id: my-geonetwork
  connector: geonetworkmcp
  description: >
    Catalogue de métadonnées GeoNetwork accessible via MCP. Contient des
    fiches de métadonnées géospatiales décrivant des jeux de données, des
    cartes et des services OGC (WMS, WFS, WCS, WMTS). Idéal pour découvrir
    des données géographiques référencées, consulter leurs métadonnées
    (étendue spatiale, système de coordonnées, licence, organisation auteur)
    et obtenir les liens de téléchargement ou d'accès aux services.
  topics:
    - métadonnées
    - catalogue
    - GeoNetwork
    - OGC
    - données géographiques
    - WMS
    - WFS
  entity_types:
    - fiche de métadonnées
    - jeu de données
    - service OGC
    - carte
    - couche
  capabilities:
    - spatial_query
    - document_retrieval
    - open_data
    - coordinates
    - geometry
  geo_scope: null
  mcp_url: "http://localhost:8080/geonetwork/srv/api/mcp"
  example_questions:
    - "Quelles données géographiques sont disponibles sur cette zone ?"
    - "Trouvez des métadonnées sur l'occupation du sol."
    - "Quels services WMS sont disponibles dans le catalogue ?"
    - "Quelle est la couverture spatiale de ce jeu de données ?"

- id: geo
  connector: geo
  description: >
    Orchestrateur d'analyse géospatiale avancée. Regroupe le géocodage
    d'adresses, le calcul de distances, les zones tampon, les isochrones
    (zones d'accessibilité), la recherche de proximité, les intersections,
    le calcul de surfaces, la détection de clusters (hotspots),
    l'optimisation d'itinéraires, les profils d'élévation, les opérations
    sur les géométries GeoJSON, l'analyse spatio-temporelle et les calculs
    de co-visibilité (viewshed).
  topics:
    - géocodage
    - distance
    - buffer
    - isochrone
    - proximité
    - itinéraire
    - altitude
  entity_types:
    - adresse
    - coordonnées
    - zone tampon
    - isochrone
    - itinéraire
  capabilities:
    - geocoding
    - routing
    - isochrone
    - elevation
    - viewshed
    - hotspot
    - temporal_analysis
    - proximity
    - buffer
    - area
    - distance
    - coordinates
  geo_scope: null
  example_questions:
    - "Géocodez cette adresse."
    - "Quelle est la distance entre ces deux points ?"
    - "Calculez l'isochrone de 15 minutes à pied depuis ce lieu."
    - "Quel est l'itinéraire le plus court entre ces points ?"
    - "Quelle est l'altitude de ce sommet ?"
